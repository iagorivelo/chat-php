version: '3.8'

services:
  # Serviço PHP-FPM
  php-fpm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-php-fpm
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - db-data:/var/www/html/app/db
    networks:
      - chat-network
    depends_on:
      - nginx

  # Serviço Nginx
  nginx:
    image: nginx:alpine
    container_name: chat-nginx
    restart: unless-stopped
    ports:
      - "9090:80"
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - chat-network

  # Serviço Adminer para gerenciar o banco SQLite
  adminer:
    image: adminer:latest
    container_name: chat-adminer
    restart: unless-stopped
    ports:
      - "9091:8080"
    volumes:
      - db-data:/var/www/html/app/db
    environment:
      ADMINER_DEFAULT_SERVER: sqlite
      ADMINER_DESIGN: dracula
    networks:
      - chat-network

# Volume compartilhado para o banco de dados
volumes:
  db-data:
    driver: local

# Rede para comunicação entre containers
networks:
  chat-network:
    driver: bridge
